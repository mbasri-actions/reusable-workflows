name: Terraform Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: 'The target environment'
        required: true
        type: string
      working-directory:
        description: 'The working directory containing Terraform files'
        required: true
        type: string
      destroy:
        description: 'Destroy infrastructure instead of apply'
        required: false
        type: boolean
        default: false
    secrets:
      GH_APP_ID:
        required: true
      GH_APP_PRIVATE_KEY:
        required: true
      TF_API_TOKEN:
        required: true
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1

jobs:
  plan:
    name: Plan (${{ inputs.environment }})
    runs-on: ubuntu-latest
    outputs:
      plan-hash: ${{ steps.hash.outputs.plan-hash }}
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: mbasri-terraform-aws-modules

      - uses: mbasri-actions/terraform-setup@v1
        with:
          working-directory: ${{ inputs.working-directory }}
          environment: ${{ inputs.environment }}
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Plan
        working-directory: ${{ inputs.working-directory }}
        run: terraform plan -no-color ${{ inputs.destroy && '-destroy' || '' }} -out=/tmp/tfplan 2>&1 | tee /tmp/plan_output.txt
        env:
          TF_WORKSPACE: ${{ inputs.environment }}

      - name: Compute Plan Hash
        id: hash
        working-directory: ${{ inputs.working-directory }}
        run: |
          terraform show -json /tmp/tfplan | jq -cS '.resource_changes' | sha256sum | cut -d ' ' -f1 > /tmp/plan-hash
          echo "plan-hash=$(cat /tmp/plan-hash)" >> $GITHUB_OUTPUT
        env:
          TF_WORKSPACE: ${{ inputs.environment }}

      - name: Generate Plan Summary
        if: always()
        shell: bash
        run: |
          set +o pipefail
          if [ -f /tmp/plan_output.txt ]; then
            CLEAN_OUTPUT=$(cat /tmp/plan_output.txt | sed 's/\x1b\[[0-9;]*m//g')
            ADD=$(echo "$CLEAN_OUTPUT" | grep -oP '\d+(?= to add)' | tail -1 || echo "0")
            CHANGE=$(echo "$CLEAN_OUTPUT" | grep -oP '\d+(?= to change)' | tail -1 || echo "0")
            DESTROY=$(echo "$CLEAN_OUTPUT" | grep -oP '\d+(?= to destroy)' | tail -1 || echo "0")
            ADD=${ADD:-0}; CHANGE=${CHANGE:-0}; DESTROY=${DESTROY:-0}
            PLAN_OUTPUT=$(echo "$CLEAN_OUTPUT" | sed -n '/Terraform will perform the following actions:/,$p' | head -c 60000 || true)
            [ -z "$PLAN_OUTPUT" ] && PLAN_OUTPUT=$(echo "$CLEAN_OUTPUT" | sed -n '/Terraform planned the following actions, but then encountered a problem:/,$p' | head -c 60000 || true)
            [ -z "$PLAN_OUTPUT" ] && PLAN_OUTPUT="No changes. Your infrastructure matches the configuration."
          else
            ADD=0; CHANGE=0; DESTROY=0
            PLAN_OUTPUT="No plan output available"
          fi

          {
            echo "### Terraform Plan${{ inputs.destroy && ' (DESTROY)' || '' }} - \`${{ inputs.environment }}\`"
            echo ""
            echo "<details><summary>Show Plan Output</summary>"
            echo ""
            echo '```diff'
            echo "$PLAN_OUTPUT"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "| Add | Change | Destroy |"
            echo "|:---:|:------:|:-------:|"
            echo "| 🟢 **+${ADD}** | 🟡 **~${CHANGE}** | 🔴 **-${DESTROY}** |"
          } > /tmp/plan_summary.md

          cat /tmp/plan_summary.md >> $GITHUB_STEP_SUMMARY

  apply:
    name: Apply (${{ inputs.environment }})
    needs: plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: mbasri-terraform-aws-modules

      - uses: mbasri-actions/terraform-setup@v1
        with:
          working-directory: ${{ inputs.working-directory }}
          environment: ${{ inputs.environment }}
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Plan
        working-directory: ${{ inputs.working-directory }}
        run: terraform plan -no-color ${{ inputs.destroy && '-destroy' || '' }} -out=/tmp/tfplan
        env:
          TF_WORKSPACE: ${{ inputs.environment }}

      - name: Verify Plan Hash
        working-directory: ${{ inputs.working-directory }}
        run: |
          CURRENT_HASH=$(terraform show -json /tmp/tfplan | jq -cS '.resource_changes' | sha256sum | cut -d ' ' -f1)
          EXPECTED_HASH="${{ needs.plan.outputs.plan-hash }}"
          echo "Expected: $EXPECTED_HASH"
          echo "Current:  $CURRENT_HASH"
          if [ "$CURRENT_HASH" != "$EXPECTED_HASH" ]; then
            echo "::error::Plan has changed since approval! Aborting apply."
            exit 1
          fi
          echo "Plan verified — no drift detected."
        env:
          TF_WORKSPACE: ${{ inputs.environment }}

      - name: Terraform Apply
        working-directory: ${{ inputs.working-directory }}
        run: terraform apply /tmp/tfplan 2>&1 | tee /tmp/apply_output.txt
        env:
          TF_WORKSPACE: ${{ inputs.environment }}

      - name: Terraform Output
        if: ${{ !inputs.destroy }}
        working-directory: ${{ inputs.working-directory }}
        run: terraform output -no-color > /tmp/output.txt 2>&1 || true
        env:
          TF_WORKSPACE: ${{ inputs.environment }}

      - name: Apply Summary
        if: success()
        shell: bash
        run: |
          {
            echo "### ✅ Terraform ${{ inputs.destroy && 'Destroy' || 'Apply' }} - \`${{ inputs.environment }}\`"
            echo ""
            echo "${{ inputs.destroy && 'Destroy' || 'Apply' }} completed successfully."
          } >> $GITHUB_STEP_SUMMARY

          if [ -f /tmp/output.txt ] && [ -s /tmp/output.txt ]; then
            OUTPUT_CONTENT=$(cat /tmp/output.txt | head -c 60000)
            {
              echo ""
              echo "<details><summary>Show Outputs</summary>"
              echo ""
              echo '```'
              echo "$OUTPUT_CONTENT"
              echo '```'
              echo ""
              echo "</details>"
            } >> $GITHUB_STEP_SUMMARY
          fi

  rejected:
    name: Rejected (${{ inputs.environment }})
    needs: apply
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Apply Rejected
        shell: bash
        run: |
          {
            echo "### ⛔ Terraform Apply Rejected - \`${{ inputs.environment }}\`"
            echo ""
            echo "The apply was rejected or failed. Check the workflow logs for details."
          } >> $GITHUB_STEP_SUMMARY

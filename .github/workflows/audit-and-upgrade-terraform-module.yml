  gitversion:
    name: GitVersion
    runs-on: ubuntu-latest
    needs: security
    permissions:
      contents: write
      models: read
    steps:
      - name: Checkout Step
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: GitVersion Step
        uses: mbasri-actions/gitversion@v1
        with:
          isTerraformModule: 'true'
name: Audit and Upgrade Terraform Module

on:
  workflow_call:
    inputs:
      trivy_enabled:
        description: 'Enable Trivy security scan'
        type: boolean
        required: false
        default: true

jobs:

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Step
        uses: actions/checkout@v6

      - name: Setup Terraform Step
        uses: hashicorp/setup-terraform@v4
        # with:
        #   terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform Init Step
        run: terraform init -backend=false

      - name: Terraform Validate Step
        run: terraform validate

      - name: Terraform Format Step
        run: terraform fmt -check -recursive

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ inputs.trivy_enabled }}
    steps:
